services:
  proxy:
    image: 3proxy/3proxy:latest
    container_name: aledev-3proxy
    restart: unless-stopped
    platform: linux/amd64
    volumes:
      - ./config:/etc/3proxy:ro
    ports:
      - "3128:3128/tcp"
      - "1080:1080/tcp"
    mem_limit: 128m
    cpus: 0.25
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
