server {
    listen 80;
    server_name aledev.ru www.aledev.ru localhost;

    client_max_body_size 200M;

    root /usr/share/nginx/html/mysite;
    index index.html;

    # Добавляем заголовок с доменом для фронтенда
    add_header X-Current-Domain "aledev.ru" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
    }

    location /media/ {
        alias /usr/share/nginx/html/media/;
        access_log off;
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    error_page 404 /index.html;
}

