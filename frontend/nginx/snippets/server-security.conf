location ~* (\.\./|//{3,}) {
    return 444;
}

location ~ /\.(?!well-known) {
    access_log off;
    log_not_found off;
    return 444;
}

location ~* ^/(?:wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin|pma|adminer|actuator|server-status)(?:/|$) {
    return 444;
}

location ~* \.(?:bak|old|orig|swp|sql|zip|tar|gz|tgz)$ {
    return 444;
}

location ~* ^/(?:CVS)(?:/|$) {
    return 444;
}

location ~* \.php$ {
    return 444;
}

location = /robots.txt {
    access_log off;
    log_not_found off;
    return 204;
}
