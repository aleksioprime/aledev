root /usr/share/nginx/html;
index index.html;

location / {
    try_files $uri $uri/ /index.html;
}

location /assets/ {
    try_files $uri =404;
}

location /media/ {
    alias /usr/share/nginx/html/media/;
    access_log off;
    expires 1d;
    add_header Cache-Control "public";
    try_files $uri =404;
}

error_page 404 /index.html;
