server {
    listen 80;
    server_name gitlab.aledev.ru www.gitlab.aledev.ru;

    include /etc/nginx/snippets/server-rate-limit.conf;
    include /etc/nginx/snippets/server-security.conf;

    location / {
        proxy_pass http://host.docker.internal:9088;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        include /etc/nginx/snippets/proxy-common.conf;
    }
}

server {
    listen 80;
    server_name argocd.aledev.ru www.argocd.aledev.ru;

    include /etc/nginx/snippets/server-rate-limit.conf;
