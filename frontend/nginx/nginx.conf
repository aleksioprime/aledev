limit_req_zone $binary_remote_addr zone=per_ip_rate:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

resolver 127.0.0.11 ipv6=off valid=30s;

proxy_headers_hash_max_size 1024;
proxy_headers_hash_bucket_size 128;

server {
    listen 80;
    server_name aledev.ru www.aledev.ru localhost;

    client_max_body_size 200M;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s;

    include /etc/nginx/snippets/server-rate-limit.conf;
    include /etc/nginx/snippets/server-security.conf;
    include /etc/nginx/snippets/spa-common.conf;

    location /vless {
        default_type text/plain;
        return 200 "Fuck YOU!";
    }
}

server {
    listen 80;
    server_name auth.aledev.ru www.auth.aledev.ru;

    include /etc/nginx/snippets/server-rate-limit.conf;
    include /etc/nginx/snippets/server-security.conf;

    location / {
        set $auth_upstream http://aledev-auth-app:8000;
        proxy_pass $auth_upstream;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}

server {
    listen 80;
    server_name portfolio.aledev.ru www.portfolio.aledev.ru;

    include /etc/nginx/snippets/server-rate-limit.conf;
    include /etc/nginx/snippets/server-security.conf;

    location / {
        set $portfolio_upstream http://aledev-portfolio-app:8000;
        proxy_pass $portfolio_upstream;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}


server {
    listen 80;
    server_name hyperspectrus.aledev.ru www.hyperspectrus.aledev.ru;

    client_max_body_size 200M;

    include /etc/nginx/snippets/server-rate-limit.conf;
    include /etc/nginx/snippets/server-security.conf;

    location / {
        proxy_pass http://aledev-tunnel:9011;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}

server {
    listen 80;
    server_name gitlab.aledev.ru www.gitlab.aledev.ru;

    include /etc/nginx/snippets/server-rate-limit.conf;
    include /etc/nginx/snippets/server-security.conf;

    location / {
        proxy_pass http://aledev-tunnel:9088;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        include /etc/nginx/snippets/proxy-common.conf;
    }
}

server {
    listen 80;
    server_name argocd.aledev.ru www.argocd.aledev.ru;

    include /etc/nginx/snippets/server-rate-limit.conf;
    include /etc/nginx/snippets/server-security.conf;

    location / {
        proxy_pass http://aledev-tunnel:9080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_redirect off;
    }
}

