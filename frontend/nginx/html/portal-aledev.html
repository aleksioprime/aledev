<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>portal.aledev.ru</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.28), transparent 42%),
          linear-gradient(160deg, #020617 0%, #111827 45%, #0f172a 100%);
        color: #e2e8f0;
      }

      main {
        width: min(100%, 720px);
        padding: 40px 32px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.82);
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
        text-align: center;
        backdrop-filter: blur(12px);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #93c5fd;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(34px, 6vw, 60px);
        line-height: 0.95;
      }

      p {
        margin: 0 auto;
        max-width: 540px;
        font-size: 18px;
        line-height: 1.65;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">portal.aledev.ru</p>
      <h1>Сервис временно недоступен</h1>
      <p>Панель находится в настройке. Попробуйте зайти позже.</p>
    </main>
  </body>
</html>
